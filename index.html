<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Analytics V2.5</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (UMD format for browser without JSX) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Lucide Icons (UMD) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        .icon-container { display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    
    <div id="root"></div>

    <script type="module">
        // Import Firebase từ gstatic CDN
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { 
          getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, 
          signInWithPopup, signOut, signInWithCustomToken 
        } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { 
          getFirestore, doc, collection, onSnapshot, setDoc, deleteDoc, query 
        } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { useState, useEffect, useMemo, createElement: e } = React;

        // --- FIREBASE INITIALIZATION ---
        // ĐIỀN CONFIG FIREBASE CỦA MÀY VÀO ĐÂY
        const myFirebaseConfig = {
          apiKey: "",
          authDomain: "",
          projectId: "",
          storageBucket: "",
          messagingSenderId: "",
          appId: ""
        };

        const isConfigValid = myFirebaseConfig.apiKey !== "";
        const finalConfig = !isConfigValid && typeof window.__firebase_config !== 'undefined' 
          ? JSON.parse(window.__firebase_config) 
          : myFirebaseConfig;

        const firebaseApp = initializeApp(finalConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);
        const globalAppId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'winston-invest-v2-5';

        // --- ICON COMPONENT HELPER ---
        const Icon = ({ name, size = 24, className = '', color = 'currentColor' }) => {
            const svgRef = React.useRef(null);
            useEffect(() => {
                if (svgRef.current && window.lucide && window.lucide.icons[name]) {
                    const iconNode = window.lucide.icons[name];
                    // Clear previous content
                    svgRef.current.innerHTML = '';
                    
                    // Create SVG element manually
                    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                    const attrs = {
                        width: size, height: size, viewBox: '0 0 24 24',
                        fill: 'none', stroke: color, strokeWidth: '2',
                        strokeLinecap: 'round', strokeLinejoin: 'round',
                        class: `lucide lucide-${name} ${className}`
                    };
                    for (const [key, val] of Object.entries(attrs)) svg.setAttribute(key, val);
                    
                    // Append children
                    iconNode[2].forEach(([tag, tagAttrs]) => {
                        const child = document.createElementNS('http://www.w3.org/2000/svg', tag);
                        for (const [k, v] of Object.entries(tagAttrs)) child.setAttribute(k, v);
                        svg.appendChild(child);
                    });
                    
                    svgRef.current.appendChild(svg);
                }
            }, [name, size, className, color]);
            return e('span', { ref: svgRef, className: 'icon-container inline-block' });
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
          const [user, setUser] = useState(null);
          const [cashFlows, setCashFlows] = useState([]);
          const [settings, setSettings] = useState({
            nav: 0, benchmark: 6.0, vnIndexStart: 1100, vnIndexCurrent: 1250
          });
          const [loading, setLoading] = useState(true);
          const [isProcessing, setIsProcessing] = useState(false);

          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                  await signInWithCustomToken(auth, window.__initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (err) { 
                console.error("Auth failed:", err); 
                setLoading(false); 
              }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (u) => {
              setUser(u);
              if (u) setLoading(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const q = query(collection(db, 'artifacts', globalAppId, 'users', user.uid, 'flows'));
            const unsubFlows = onSnapshot(q, (snap) => {
              const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
              setCashFlows(data.sort((a, b) => new Date(a.date) - new Date(b.date)));
            }, (err) => console.error("Flows sync error:", err));

            const configDoc = doc(db, 'artifacts', globalAppId, 'users', user.uid, 'settings', 'main');
            const unsubConfig = onSnapshot(configDoc, (docSnap) => {
              if (docSnap.exists()) setSettings(prev => ({ ...prev, ...docSnap.data() }));
            }, (err) => console.error("Settings sync error:", err));

            return () => { unsubFlows(); unsubConfig(); };
          }, [user]);

          const xirr = useMemo(() => {
            const flows = [
              ...cashFlows.map(f => ({ date: new Date(f.date), amount: -parseFloat(f.amount || 0) })),
              { date: new Date(), amount: parseFloat(settings.nav || 0) }
            ];
            if (flows.length < 2 || cashFlows.length === 0) return 0;
            const calc = (rate) => flows.reduce((acc, f) => acc + f.amount / Math.pow(1 + rate, (f.date - flows[0].date) / 86400000 / 365), 0);
            const deriv = (rate) => flows.reduce((acc, f) => {
              const t = (f.date - flows[0].date) / 86400000 / 365;
              return acc - t * f.amount / Math.pow(1 + rate, t + 1);
            }, 0);
            let rate = 0.1;
            for (let i = 0; i < 30; i++) {
              const f = calc(rate); const df = deriv(rate);
              if (Math.abs(f) < 1e-7) break;
              rate = rate - f / df;
            }
            return isNaN(rate) || !isFinite(rate) ? 0 : rate * 100;
          }, [cashFlows, settings.nav]);

          const vnIndexGrowth = useMemo(() => {
            if (!settings.vnIndexStart || !settings.vnIndexCurrent) return 0;
            return ((settings.vnIndexCurrent - settings.vnIndexStart) / settings.vnIndexStart) * 100;
          }, [settings.vnIndexStart, settings.vnIndexCurrent]);

          const addFlow = async () => {
            if (!user || isProcessing) return;
            setIsProcessing(true);
            try {
              const id = crypto.randomUUID();
              await setDoc(doc(db, 'artifacts', globalAppId, 'users', user.uid, 'flows', id), {
                date: new Date().toISOString().split('T')[0], amount: 0, description: 'Giao dịch mới'
              });
            } finally { setIsProcessing(false); }
          };

          const updateSetting = (key, value) => {
            setSettings(prev => ({ ...prev, [key]: value }));
            if (user) setDoc(doc(db, 'artifacts', globalAppId, 'users', user.uid, 'settings', 'main'), { [key]: value }, { merge: true });
          };

          if (loading) return e(LoadingScreen, null);

          return e('div', { className: "min-h-screen bg-[#F8FAFC] text-slate-900 font-sans p-4 md:p-6 lg:p-8" },
            e('div', { className: "max-w-7xl mx-auto space-y-8" },
              e(Header, { user, isConfigValid }),
              e('div', { className: "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" },
                e(MetricCard, { title: "Tỷ suất XIRR", value: `${xirr.toFixed(2)}%`, sub: "Lãi suất thực năm", highlight: true, iconName: "zap" }),
                e(MetricCard, { title: "Thị trường (VNI)", value: `${vnIndexGrowth.toFixed(1)}%`, sub: "VNI Benchmark", iconName: "line-chart" }),
                e(MetricCard, { title: "Market Alpha", value: `${(xirr - vnIndexGrowth).toFixed(2)}%`, sub: "Vs VN-Index", variant: xirr >= vnIndexGrowth ? 'success' : 'danger', iconName: "activity" }),
                e(MetricCard, { title: "Savings Alpha", value: `${(xirr - settings.benchmark).toFixed(2)}%`, sub: `Vs Savings ${settings.benchmark}%`, variant: xirr >= settings.benchmark ? 'success' : 'danger', iconName: "wallet" })
              ),
              e('div', { className: "grid grid-cols-1 lg:grid-cols-12 gap-8" },
                e('div', { className: "lg:col-span-8 space-y-6" },
                  e(CashFlowTable, { cashFlows, onAdd: addFlow, user, appId: globalAppId, db }),
                  e(NavInputCard, { navValue: settings.nav, onChange: (v) => updateSetting('nav', v) })
                ),
                e('div', { className: "lg:col-span-4 space-y-6" },
                  e(MarketContextCard, { settings, updateSetting, vnIndexGrowth, xirr }),
                  e(SavingsSliderCard, { benchmark: settings.benchmark, onChange: (v) => updateSetting('benchmark', v) }),
                  e(ComparisonCard, { xirr, benchmark: settings.benchmark, navValue: settings.nav }),
                  e(ProjectionCard, { xirr, navValue: settings.nav })
                )
              )
            )
          );
        };

        // --- SUB-COMPONENTS ---
        const Header = ({ user, isConfigValid }) => {
            const loginBtn = user?.isAnonymous ? 
                e('button', { 
                    onClick: () => signInWithPopup(auth, new GoogleAuthProvider()),
                    className: "px-4 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black uppercase tracking-wider shadow-sm hover:bg-slate-50 transition-all flex items-center gap-2"
                }, e(Icon, { name: "settings", size: 14, className: "text-indigo-600" }), " Cloud Backup")
                :
                e('div', { className: "flex items-center gap-3 bg-white pl-1.5 pr-4 py-1.5 rounded-2xl shadow-sm border border-slate-100" },
                    e('img', {
                        src: user?.photoURL || `https://ui-avatars.com/api/?name=${user?.displayName || 'Winston'}&background=e0e7ff&color=4f46e5`,
                        className: "w-7 h-7 rounded-xl object-cover bg-indigo-50", alt: "Avatar",
                        onError: (e) => { e.target.onerror = null; e.target.src = `https://ui-avatars.com/api/?name=${user?.displayName || 'W'}&background=e0e7ff&color=4f46e5`; }
                    }),
                    e('span', { className: "text-[10px] font-black uppercase text-slate-600 max-w-[100px] truncate" }, user?.displayName || 'Investor'),
                    e('button', { onClick: () => signOut(auth), className: "text-slate-300 hover:text-red-500 transition-colors", title: "Đăng xuất" }, e(Icon, { name: "log-out", size: 16 }))
                );

            return e('div', { className: "flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6" },
                e('div', { className: "flex items-center gap-4" },
                    e('div', { className: "w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center shadow-xl shadow-slate-200" }, e(Icon, { name: "activity", size: 24, color: "white" })),
                    e('div', null,
                        e('h1', { className: "text-2xl font-black tracking-tighter uppercase" }, "Investment ", e('span', { className: "text-indigo-600" }, "Analytics")),
                        e('p', { className: "text-[10px] font-bold text-slate-400 uppercase tracking-widest" }, "Growth Engine V2.5 • Winston")
                    )
                ),
                e('div', { className: "flex items-center gap-3 self-end sm:self-auto" },
                    !isConfigValid && e('div', { className: "flex items-center gap-2 px-3 py-1.5 bg-amber-50 text-amber-600 rounded-xl border border-amber-100 text-[9px] font-black uppercase tracking-tighter" }, e(Icon, { name: "alert-triangle", size: 12 }), " Local Session"),
                    loginBtn
                )
            );
        };

        const CashFlowTable = ({ cashFlows, onAdd, user, appId, db }) => {
            return e('div', { className: "bg-white rounded-[2.5rem] border border-slate-200 shadow-xl shadow-slate-100/50 overflow-hidden transition-all hover:shadow-slate-200/50" },
                e('div', { className: "p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/30" },
                    e('div', { className: "flex items-center gap-3" },
                        e('div', { className: "w-8 h-8 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-600" }, e(Icon, { name: "history", size: 18 })),
                        e('h3', { className: "text-xs font-black uppercase tracking-widest text-slate-700" }, "Lịch sử nạp rút vốn")
                    ),
                    e('button', { onClick: onAdd, className: "px-4 py-2 bg-indigo-600 text-white text-[10px] font-black rounded-xl uppercase tracking-widest hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100" }, "+ Thêm dòng tiền")
                ),
                e('div', { className: "overflow-x-auto max-h-[450px]" },
                    e('table', { className: "w-full text-left text-sm" },
                        e('thead', { className: "bg-slate-50 text-[10px] font-black uppercase text-slate-400 sticky top-0 z-10 border-b border-slate-100" },
                            e('tr', null,
                                e('th', { className: "px-6 py-4" }, "Ngày"),
                                e('th', { className: "px-6 py-4" }, "Nội dung"),
                                e('th', { className: "px-6 py-4 text-right" }, "Số tiền"),
                                e('th', { className: "px-6 py-4 text-right" })
                            )
                        ),
                        e('tbody', { className: "divide-y divide-slate-50" },
                            cashFlows.length === 0 ? 
                            e('tr', null, e('td', { colSpan: 4, className: "py-24 text-center" }, 
                                e('div', { className: "flex flex-col items-center gap-3 opacity-20" }, e(Icon, { name: "pie-chart", size: 48 }), e('p', { className: "text-[10px] font-black uppercase tracking-widest italic" }, "Hãy bắt đầu bằng khoản nạp vốn đầu tiên"))
                            )) :
                            cashFlows.map(f => e(CashFlowRow, { key: f.id, flow: f, user, appId, db }))
                        )
                    )
                )
            );
        };

        const CashFlowRow = ({ flow, user, appId, db }) => {
            const [localFlow, setLocalFlow] = useState(flow);
            useEffect(() => { setLocalFlow(flow); }, [flow]);
            const handleChange = (field, value) => { setLocalFlow(prev => ({ ...prev, [field]: value })); };
            const handleBlur = (field) => {
                if (localFlow[field] !== flow[field]) {
                    let finalValue = localFlow[field];
                    if (field === 'amount') finalValue = parseFloat(finalValue) || 0;
                    setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'flows', flow.id), { [field]: finalValue }, { merge: true });
                }
            };
            return e('tr', { className: "group hover:bg-slate-50/80 transition-colors" },
                e('td', { className: "px-6 py-4" }, e('input', { type: "date", value: localFlow.date, onChange: e => handleChange('date', e.target.value), onBlur: () => handleBlur('date'), className: "bg-transparent border-none text-xs font-bold p-0 focus:ring-0 w-full" })),
                e('td', { className: "px-6 py-4" }, e('input', { type: "text", value: localFlow.description, onChange: e => handleChange('description', e.target.value), onBlur: () => handleBlur('description'), className: "bg-transparent border-none text-xs w-full p-0 focus:ring-0 text-slate-500 font-medium" })),
                e('td', { className: "px-6 py-4 text-right" }, e('input', { type: "number", value: localFlow.amount, onChange: e => handleChange('amount', e.target.value), onBlur: () => handleBlur('amount'), className: `bg-transparent border-none font-mono font-black text-right p-0 focus:ring-0 w-full text-base ${localFlow.amount >= 0 ? 'text-indigo-600' : 'text-rose-500'}` })),
                e('td', { className: "px-6 py-4 text-right" }, e('button', { onClick: () => deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'flows', flow.id)), className: "opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-all" }, e(Icon, { name: "trash-2", size: 16 })))
            );
        };

        const NavInputCard = ({ navValue, onChange }) => {
            const [localNav, setLocalNav] = useState(navValue);
            useEffect(() => { setLocalNav(navValue); }, [navValue]);
            const handleBlur = () => { const val = parseFloat(localNav) || 0; if (val !== navValue) onChange(val); };
            return e('div', { className: "bg-white p-8 rounded-[2.5rem] border border-white shadow-xl shadow-slate-200/50 relative overflow-hidden group hover:shadow-slate-300/50 transition-all" },
                e('div', { className: "relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-6" },
                    e('div', { className: "space-y-1" },
                        e('h3', { className: "text-xs font-black uppercase tracking-[0.2em] text-slate-400 flex items-center gap-2" }, e(Icon, { name: "target", size: 18, className: "text-green-500" }), " Tài sản hiện có (NAV)"),
                        e('p', { className: "text-[10px] text-slate-300 font-bold uppercase" }, "Tổng số dư trong App chứng khoán (Tiền + Cổ phiếu)")
                    ),
                    e('div', { className: "flex items-end gap-3 flex-1 justify-end max-w-md" },
                        e('input', { type: "number", value: localNav, onChange: e => setLocalNav(e.target.value), onBlur: handleBlur, className: "w-full text-5xl font-black text-slate-900 border-none p-0 focus:ring-0 bg-transparent text-right placeholder-slate-100" }),
                        e('span', { className: "text-xs font-black text-slate-300 uppercase italic pb-2" }, "VNĐ")
                    )
                ),
                e(Icon, { name: "target", size: 240, className: "absolute top-[10%] right-[-5%] opacity-[0.02] group-hover:opacity-[0.04] transition-opacity pointer-events-none" })
            );
        };

        const MarketContextCard = ({ settings, updateSetting, vnIndexGrowth, xirr }) => {
            const [localStart, setLocalStart] = useState(settings.vnIndexStart);
            const [localCurrent, setLocalCurrent] = useState(settings.vnIndexCurrent);
            useEffect(() => { setLocalStart(settings.vnIndexStart); }, [settings.vnIndexStart]);
            useEffect(() => { setLocalCurrent(settings.vnIndexCurrent); }, [settings.vnIndexCurrent]);
            const handleBlurStart = () => updateSetting('vnIndexStart', parseFloat(localStart) || 0);
            const handleBlurCurrent = () => updateSetting('vnIndexCurrent', parseFloat(localCurrent) || 0);
            
            return e('div', { className: "bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden" },
                e('div', { className: "relative z-10 space-y-8" },
                    e('div', { className: "flex items-center gap-2" }, e(Icon, { name: "bar-chart-3", size: 16, className: "text-indigo-400" }), e('h4', { className: "text-[10px] font-black uppercase tracking-widest text-indigo-400" }, "Thị trường VN-Index")),
                    e('div', { className: "grid grid-cols-2 gap-4" },
                        e('div', { className: "space-y-1" }, e('label', { className: "text-[9px] font-black text-slate-500 uppercase tracking-widest" }, "Base Index"), e('input', { type: "number", value: localStart, onChange: e => setLocalStart(e.target.value), onBlur: handleBlurStart, className: "bg-white/5 border-none rounded-xl px-4 py-3 text-lg font-black w-full text-white focus:ring-2 focus:ring-indigo-500" })),
                        e('div', { className: "space-y-1" }, e('label', { className: "text-[9px] font-black text-slate-500 uppercase tracking-widest" }, "Current Index"), e('input', { type: "number", value: localCurrent, onChange: e => setLocalCurrent(e.target.value), onBlur: handleBlurCurrent, className: "bg-white/5 border-none rounded-xl px-4 py-3 text-lg font-black w-full text-white focus:ring-2 focus:ring-indigo-500" }))
                    ),
                    e('div', { className: "pt-6 border-t border-white/5 flex items-center justify-between" },
                        e('div', null, e('span', { className: "text-[9px] font-black text-slate-500 uppercase" }, "Growth"), e('div', { className: "text-4xl font-black text-indigo-400 leading-none" }, `${vnIndexGrowth.toFixed(1)}%`)),
                        e('div', { className: `px-3 py-1.5 rounded-xl text-[10px] font-black uppercase ${xirr >= vnIndexGrowth ? 'bg-green-500/20 text-green-400 border border-green-500/20' : 'bg-rose-500/20 text-rose-400 border border-rose-500/20'}` }, xirr >= vnIndexGrowth ? 'Outperform' : 'Underperform')
                    )
                ),
                e(Icon, { name: "activity", size: 150, className: "absolute right-[-20px] top-[-20px] opacity-[0.03] rotate-[-15deg] pointer-events-none" })
            );
        };

        const SavingsSliderCard = ({ benchmark, onChange }) => {
            const [localValue, setLocalValue] = useState(benchmark);
            useEffect(() => { setLocalValue(benchmark); }, [benchmark]);
            const handleChange = (e) => setLocalValue(parseFloat(e.target.value));
            const handleCommit = () => { if (localValue !== benchmark) onChange(localValue); };
            return e('div', { className: "bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-xl shadow-slate-100/50 hover:shadow-slate-200/50 transition-all" },
                e('h4', { className: "text-[10px] font-black uppercase tracking-widest text-slate-400 mb-8" }, "Savings Benchmark"),
                e('div', { className: "space-y-6" },
                    e('div', { className: "flex justify-between items-end" }, e('span', { className: "text-[11px] font-black text-slate-600 uppercase" }, "Lãi tiết kiệm"), e('span', { className: "text-3xl font-black text-indigo-600" }, `${localValue}%`)),
                    e('input', { type: "range", min: "0", max: "15", step: "0.5", value: localValue, onChange: handleChange, onMouseUp: handleCommit, onTouchEnd: handleCommit, className: "w-full h-1.5 bg-slate-100 rounded-full appearance-none cursor-pointer accent-indigo-600" })
                )
            );
        };

        const ComparisonCard = ({ xirr, benchmark, navValue }) => {
            return e('div', { className: "bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-xl shadow-slate-100/50 hover:shadow-slate-200/50 transition-all" },
                e('div', { className: "flex items-center gap-2 mb-6" }, e(Icon, { name: "scale", size: 18, className: "text-indigo-600" }), e('h4', { className: "text-[10px] font-black uppercase tracking-widest text-slate-700" }, "So sánh vs Tiết kiệm")),
                e('div', { className: "space-y-4" },
                    e(ComparisonRow, { label: "Chênh lệch 1 năm", currentXirr: xirr, savingRate: benchmark, nav: navValue, years: 1 }),
                    e(ComparisonRow, { label: "Chênh lệch 3 năm", currentXirr: xirr, savingRate: benchmark, nav: navValue, years: 3 }),
                    e(ComparisonRow, { label: "Chênh lệch 5 năm", currentXirr: xirr, savingRate: benchmark, nav: navValue, years: 5 })
                ),
                e('p', { className: "mt-6 text-[9px] text-slate-400 font-bold uppercase leading-tight italic" }, "* Số tiền mày kiếm thêm (hoặc mất đi) nếu duy trì hiệu suất đầu tư so với gửi tiết kiệm.")
            );
        };

        const ProjectionCard = ({ xirr, navValue }) => {
            return e('div', { className: "bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl shadow-indigo-200 relative overflow-hidden group" },
                e('h4', { className: "text-[10px] font-black uppercase tracking-widest text-indigo-200 mb-8 flex items-center gap-2 relative z-10" }, e(Icon, { name: "chevron-right", size: 16 }), " Lãi kép dự kiến"),
                e('div', { className: "space-y-4 relative z-10" },
                    e(ProjectionItem, { label: "Sau 3 năm", value: navValue * Math.pow(1 + xirr/100, 3) }),
                    e(ProjectionItem, { label: "Sau 5 năm", value: navValue * Math.pow(1 + xirr/100, 5) }),
                    e(ProjectionItem, { label: "Sau 10 năm", value: navValue * Math.pow(1 + xirr/100, 10), bold: true })
                ),
                e(Icon, { name: "mouse-pointer-2", size: 100, className: "absolute right-[-10px] bottom-[-10px] opacity-10 group-hover:scale-110 transition-transform pointer-events-none" })
            );
        };

        const ComparisonRow = ({ label, currentXirr, savingRate, nav, years }) => {
            const diff = (nav * Math.pow(1 + currentXirr/100, years)) - (nav * Math.pow(1 + savingRate/100, years));
            return e('div', { className: "flex justify-between items-center py-2 border-b border-slate-50 last:border-0" },
                e('span', { className: "text-[9px] font-bold text-slate-400 uppercase" }, label),
                e('span', { className: `font-mono text-sm font-black ${diff >= 0 ? 'text-green-600' : 'text-rose-500'}` }, `${diff >= 0 ? '+' : ''}${Math.round(diff).toLocaleString()}đ`)
            );
        };

        const MetricCard = ({ title, value, sub, variant = 'default', highlight = false, iconName }) => {
            const getTheme = () => { if (variant === 'success') return 'text-green-600'; if (variant === 'danger') return 'text-rose-600'; if (highlight) return 'text-indigo-600'; return 'text-slate-900'; };
            return e('div', { className: "bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-100/50 border border-white hover:-translate-y-1 transition-all duration-300" },
                e('div', { className: "flex justify-between items-start mb-4" },
                    e('span', { className: "text-[9px] font-black text-slate-400 uppercase tracking-widest" }, title),
                    e('div', { className: "p-2 bg-slate-50 rounded-xl text-slate-400 flex items-center justify-center" }, e(Icon, { name: iconName, size: 18 }))
                ),
                e('div', { className: `text-2xl font-black ${getTheme()}` }, value),
                e('div', { className: "text-[9px] font-bold text-slate-300 uppercase tracking-tighter mt-1" }, sub)
            );
        };

        const ProjectionItem = ({ label, value, bold }) => {
            return e('div', { className: "flex justify-between items-center py-2 border-b border-indigo-500/30 last:border-0" },
                e('span', { className: "text-[10px] font-bold text-indigo-100 uppercase tracking-tighter" }, label),
                e('span', { className: `font-mono text-white ${bold ? 'font-black text-xl text-indigo-200' : 'font-bold text-base'}` }, `${Math.round(value).toLocaleString()}đ`)
            );
        };

        const LoadingScreen = () => e('div', { className: "h-screen flex items-center justify-center bg-slate-50" },
            e('div', { className: "flex flex-col items-center gap-4" },
                e('div', { className: "w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin" }),
                e('span', { className: "text-xs font-black uppercase tracking-[0.3em] text-slate-400 font-sans" }, "Winston Invest OS")
            )
        );

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(e(App));
        }
    </script>
</body>
</html>
